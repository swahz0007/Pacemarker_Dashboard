name: Verify and deploy anonymized dashboard

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/netlify-production.yml"
      - "backend/**"
      - "dashboard_ui/**"
      - "netlify.toml"
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/netlify-production.yml"
      - "backend/**"
      - "dashboard_ui/**"
      - "netlify.toml"
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "tests/**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install locked dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci

      - name: Run regression checks
        run: npm run check

      - name: Build anonymized publish directory
        run: npm run build

      - name: Verify privacy audit
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          audit = json.loads(Path("netlify_publish/privacy_audit.json").read_text(encoding="utf-8"))
          if audit.get("status") != "pass":
              raise SystemExit(f"Privacy audit failed: {audit}")
          print(f"Privacy audit passed for {audit.get('patient_count')} anonymized patients.")
          PY

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install locked dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci

      - name: Build verified publish directory
        run: npm run build

      - name: Deploy production site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --no-install netlify-cli deploy
          --prod
          --no-build
          --dir netlify_publish
          --site "$NETLIFY_SITE_ID"
          --auth "$NETLIFY_AUTH_TOKEN"
          --message "Anonymized dashboard deploy $GITHUB_SHA"
